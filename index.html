<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <dialog id="popUp">
        <div>
            <div data-winner-mssg></div>
            <div id="restartBtn">Play Again</div>
        </div>
    </dialog>

    <section id="introPage">
        <main>
            <section>
                <div>
                    <div class="character playerOne" id="Rick"></div>
                    <div class="character playerOne" id="Morty"></div>
                </div>
                <button>Player One</button>
            </section>
            <section>
                <div>
                    <div class="character playerTwo" id="Turkey_Obama"></div>
                </div>
                <button>Player Two</button>
            </section>
            
            <button id="start">START GAME</button>
        </main>
    </section>



        <section id="TicTacToe">
            <div id="container">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
    <script src="script.js"></script>

</body>
</html>
